<svg xmlns="http://www.w3.org/2000/svg" width="2934" height="852" viewBox="0 0 2934 852" role="img" aria-labelledby="title desc">
  <title id="title">Architect greeting terminal screenshot</title>
  <desc id="desc">A terminal-style screenshot showing the Website Architect greeting and mentioning a build time of about 60 minutes.</desc>

  <rect width="2934" height="852" fill="#f7f4ee"/>
  <rect x="0" y="0" width="2934" height="146" fill="#faf8f3"/>

  <g transform="translate(24 30)">
    <rect x="0" y="18" width="106" height="40" fill="#e8a1a2"/>
    <rect x="8" y="6" width="90" height="18" rx="4" fill="#f0b7b7"/>
    <rect x="20" y="20" width="8" height="12" fill="#111"/>
    <rect x="52" y="20" width="8" height="12" fill="#111"/>
    <rect x="84" y="20" width="8" height="12" fill="#111"/>
    <rect x="20" y="62" width="8" height="12" fill="#e8a1a2"/>
    <rect x="36" y="62" width="8" height="12" fill="#e8a1a2"/>
    <rect x="70" y="62" width="8" height="12" fill="#e8a1a2"/>
    <rect x="86" y="62" width="8" height="12" fill="#e8a1a2"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">
    <text x="170" y="46" font-size="22" font-weight="700" fill="#111">Claude Code</text>
    <text x="338" y="46" font-size="22" fill="#a0a0a0">v2.1.112</text>
    <text x="170" y="82" font-size="28" fill="#9b9b9b">Sonnet 4.6 with high effort • Claude Max</text>
    <text x="170" y="112" font-size="26" fill="#8b8b8b">~/work/claude/code/free-website</text>
    <text x="170" y="138" font-size="22" fill="#ef8b86">Welcome to Opus 4.7 xhigh!</text>
    <text x="552" y="138" font-size="22" fill="#9b9b9b">• /effort to tune speed vs. intelligence</text>
  </g>

  <rect x="18" y="145" width="2898" height="28" fill="#333333"/>
  <text x="45" y="165" font-size="22" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-weight="700" fill="#f6f3eb">hello</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">
    <circle cx="25" cy="214" r="7" fill="#7ac76b"/>
    <text x="46" y="223" font-size="24" fill="#111"><tspan font-weight="700">Skill</tspan>(/architect)</text>
    <text x="52" y="251" font-size="18" fill="#8d8d8d">└─ Successfully loaded skill</text>

    <text x="46" y="305" font-size="24" fill="#a0a0a0">Read 1 file (ctrl+o to expand)</text>

    <text x="46" y="365" font-size="24" fill="#111">Welcome! I'm your Website Architect.</text>

    <text x="46" y="429" font-size="24" fill="#111">
      <tspan x="46" dy="0">Together we'll build and publish a </tspan>
      <tspan font-weight="700">real, live website — completely free</tspan>
      <tspan> in about 60 minutes. I'll ask you a few questions, research your background if you have URLs or documents to share, then generate</tspan>
      <tspan x="46" dy="32">your site and publish it live on GitHub Pages. No coding required.</tspan>
    </text>

    <text x="46" y="502" font-size="24" fill="#111">---</text>

    <text x="46" y="536" font-size="24" font-weight="700" fill="#111">Let's start with Step 2 — do you have any of the following to share?</text>

    <text x="46" y="592" font-size="24" fill="#111">
      <tspan x="46" dy="0">— A </tspan>
      <tspan font-weight="700">URL</tspan>
      <tspan> (personal site, LinkedIn profile, company website, social media)</tspan>
    </text>

    <text x="46" y="622" font-size="24" fill="#111">
      <tspan x="46" dy="0">— Any </tspan>
      <tspan font-weight="700">documents or text</tspan>
      <tspan> (CV, bio, pitch deck, brochure — you can paste the text directly)</tspan>
    </text>

    <text x="46" y="678" font-size="24" fill="#111">
      <tspan x="46" dy="0">This helps me pre-fill your website with accurate info about you. If you don't have anything to share, just say so and we'll start from scratch!</tspan>
    </text>
  </g>

  <line x1="16" y1="720" x2="2918" y2="720" stroke="#b6b6b6" stroke-width="2"/>
  <text x="18" y="754" font-size="48" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" fill="#111">›</text>
  <rect x="47" y="733" width="13" height="28" fill="#111"/>
  <line x1="16" y1="776" x2="2918" y2="776" stroke="#b6b6b6" stroke-width="2"/>
  <text x="46" y="810" font-size="22" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" fill="#a3a3a3">? for shortcuts</text>
</svg>
